root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/stratus ./cmd/stratus"
  bin = "./tmp/stratus"
  args_bin = ["serve"]
  include_ext = ["go"]
  exclude_dir = [
    "tmp",
    "frontend",
    "node_modules",
    "cmd/stratus/static",
    "cmd/stratus/skills",
    "cmd/stratus/agents",
    "cmd/stratus/rules",
    "cmd/stratus/agents-opencode",
    "cmd/stratus/commands-opencode",
    "cmd/stratus/plugins-opencode",
    ".git",
    "swarm",
    "swarm-worktrees",
    "docs",
    "scripts",
    "memory",
  ]
  exclude_regex = ["_test\\.go$"]
  kill_delay = "500ms"
  send_interrupt = true
  stop_on_error = true
  delay = 500

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
